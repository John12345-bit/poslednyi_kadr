<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ПОСЛЕДНИЙ КАДР</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      color: #000;
    }

    .loading-container {
      text-align: center;
      color: #000;
    }

    .loading-title {
      font-size: 10rem;
      font-weight: 900;
      margin-bottom: 50px;
      letter-spacing: 3px;
      color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .letter:nth-child(1) { animation-delay: 0s; }
    .letter:nth-child(2) { animation-delay: 0.3s; }
    .letter:nth-child(3) { animation-delay: 0.6s; }
    .letter:nth-child(4) { animation-delay: 0.9s; }
    .letter:nth-child(5) { animation-delay: 1.2s; }
    .letter:nth-child(6) { animation-delay: 1.5s; }

    .letter {
      display: inline-block;
      animation: drawLetter 3s ease-in-out forwards;
      opacity: 0;
      -webkit-text-stroke: 2px #000;
      -webkit-text-stroke-dasharray: 4000;
      -webkit-text-stroke-dashoffset: 4000;
      color: #000;
    }

    @keyframes drawLetter {
      0% {
        opacity: 0;
        -webkit-text-stroke-dashoffset: 4000;
      }
      50% {
        opacity: 1;
        -webkit-text-stroke-dashoffset: 0;
        color: transparent;
      }
      100% {
        opacity: 1;
        -webkit-text-stroke-dashoffset: 0;
        color: #000;
      }
    }

    .loading-subtitle {
      margin-top: 30px;
      font-size: 0.9rem;
      color: #333;
      animation: fadeIn 2s ease-out 3s both;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <h1 class="loading-title">
      <div class="word"><span class="letter">ПОСЛЕД</span><span class="letter">НИЙ</span></div>
      <div class="word"><span class="letter">К</span><span class="letter">А</span><span class="letter">Д</span><span class="letter">Р</span></div>
    </h1>

    <p class="loading-subtitle">Музыка зовет</p>
  </div>

  <script>
    // Перенаправление на главную страницу после загрузки
    setTimeout(() => {
      window.location.href = 'main.html';
    }, 5000);
  </script>
</body>
</html>
