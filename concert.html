<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ПОСЛЕДНИЙ КАДР — Фотоотчет</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .concert-page{min-height:100vh;padding:24px;color:#000}
    .concert-wrap{max-width:1000px;margin:40px auto;display:flex;flex-direction:column;align-items:center}
    .photos-gallery{width:100%;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:24px}
    .photo-item{position:relative;overflow:hidden;border:1px solid var(--bg);background:#000}
    .photo-item img{width:100%;height:200px;object-fit:cover;display:block;transition:transform 0.3s ease}
    .photo-item:hover img{transform:scale(1.05)}
    .concert-message{color:#000;text-align:center;font-size:1.1rem;margin-bottom:24px}
  </style>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">ПОСЛЕДНИЙ КАДР</h1>
    <div class="header-buttons">
      <a href="main.html" class="concert-btn">Главная</a>
      <a href="concerts.html" class="concert-btn">Даты концертов</a>
      <a href="video.html" class="concert-btn">кто такая группа "ПОСЛЕДНИЙ КАДР"?</a>
      <a href="photos.html" class="concert-btn">Фотоотчеты</a>
    </div>
  </header>

  <main class="concert-page">
    <div class="concert-wrap">
      <h2 id="concertTitle">Фотоотчет</h2>
      <p class="concert-message" id="concertVenue"></p>

      <div class="photos-gallery" id="concertGallery">
        <!-- Фото концерта будут загружены сюда -->
      </div>
    </div>
  </main>

  <script>
    // Данные о концертах - должны совпадать с photos.html
    const concerts = [
      {
        venue: "Аксай Школа №2",
        preview: "photo1.jpg",
        photos: ["photo1.jpg", "photo2.jpg", "photo3.jpg"]
      }
      // Добавляй новые концерты сюда, синхронизируя с photos.html
    ];

    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const index = urlParams.get('index');

      if (index !== null && concerts[index]) {
        const concert = concerts[index];
        document.getElementById('concertTitle').textContent = `Фотоотчет - ${concert.venue}`;
        document.getElementById('concertVenue').textContent = concert.venue;

        const gallery = document.getElementById('concertGallery');
        concert.photos.forEach(filename => {
          const photoItem = document.createElement('div');
          photoItem.className = 'photo-item';

          const img = document.createElement('img');
          img.src = `images/${filename}`;
          img.alt = `Фотография - ${filename}`;
          img.onerror = function() {
            this.parentElement.style.display = 'none';
          };

          photoItem.appendChild(img);
          gallery.appendChild(photoItem);
        });
      } else {
        document.getElementById('concertTitle').textContent = 'Концерт не найден';
      }
    });
  </script>
</body>
</html></content>
