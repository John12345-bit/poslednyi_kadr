<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ПОСЛЕДНИЙ КАДР — Даты концертов</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Page-specific tweaks */
    .concert-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .concert-message{color:#000;font-size:1.6rem;font-weight:800;text-align:center;max-width:900px}
    @media(min-width:900px){.concert-message{font-size:2rem}}
  </style>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">ПОСЛЕДНИЙ КАДР</h1>
    <div class="header-buttons">
      <a href="main.html" class="concert-btn">Главная</a>
      <a href="concerts.html" class="concert-btn">Даты концертов</a>
      <a href="video.html" class="concert-btn">кто такая группа "ПОСЛЕДНИЙ КАДР"?</a>
      <a href="photos.html" class="concert-btn">Фотоотчеты</a>
    </div>
  </header>
  <main class="concert-page">
    <div class="concert-message">новых концертов пока нет, мы работаем над этим!
      
      <div style="margin-top:16px">
        <button class="open-modal-btn">Уведомить о следующих концертах</button>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="concertModal" aria-hidden="true">
      <div class="modal-overlay" data-close></div>
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" data-close aria-label="Закрыть">×</button>
        <h2 id="modalTitle">Следите за датами концертов</h2>
        <p>Оставьте e‑mail, и мы сообщим, когда появятся даты новых концертов.</p>
        <form id="notifyForm">
          <input type="email" name="email" placeholder="Ваш e‑mail" required>
          <button type="submit">Подписаться</button>
        </form>
        <p class="modal-status" aria-live="polite"></p>
      </div>
    </div>
  </main>
  <script>
  (function(){
    const openBtn = document.querySelector('.open-modal-btn');
    const modal = document.getElementById('concertModal');
    const closeEls = modal ? modal.querySelectorAll('[data-close]') : [];
    const form = document.getElementById('notifyForm');
    const status = modal ? modal.querySelector('.modal-status') : null;

    function openModal(){ if(!modal) return; modal.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; modal.focus(); }
    function closeModal(){ if(!modal) return; modal.setAttribute('aria-hidden','true'); document.body.style.overflow=''; if(status) status.textContent=''; if(form) form.reset(); }

    openBtn && openBtn.addEventListener('click', openModal);
    closeEls.forEach(el=>el.addEventListener('click', closeModal));

    document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

    // close when clicking overlay
    if(modal){
      modal.addEventListener('click', function(e){ if(e.target.classList.contains('modal-overlay')) closeModal(); });
    }

    if(form){
      form.addEventListener('submit', function(e){
        e.preventDefault();
        const email = (form.email.value || '').trim();
        const statusText = status;

        // Простая валидация e-mail
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(!re.test(email)){
          if(statusText) statusText.textContent = 'Введите корректный e‑mail.';
          return;
        }

        const STORAGE_KEY = 'nekino_subscribers';
        let list = [];
        try{ list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }catch(err){ list = []; }

        // Добавляем только уникальные email (без учёта регистра)
        const exists = list.some(item => item.email && item.email.toLowerCase() === email.toLowerCase());
        if(!exists){
          list.push({ email: email, createdAt: new Date().toISOString() });
          try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }catch(err){ /* ignore */ }
        }

        if(statusText) statusText.textContent = 'Спасибо! Вы подписаны.';
        form.reset();
        setTimeout(closeModal,1500);
      });
    }
  })();
  </script>
</body>
</html>
